<!DOCTYPE html>
<html>
<head>
  <title>Your Bakery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #fff;
      text-align: center;
    }

    .hero {
      width: 100%;
      height: 400px;
      background-image: url('cookies-hero.jpg');
      background-size: cover;
      background-position: center;
    }

    .section {
      padding: 40px 20px;
    }

    .images {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .images img {
      width: 250px;
      border-radius: 10px;
    }

    h1 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- HERO IMAGE -->
  <div class="hero"></div>

  <!-- TITLE -->
  <div class="section">
    <h1>Small-Batch Cookies 🍪</h1>
    <p>Made fresh each week 🤍</p>
  </div>

  <!-- PRODUCT PHOTOS -->
  <div class="section">
    <div class="images">
      <img src="cookies-hero.jpg">
      <img src="cookies-close.jpg">
    </div>
  </div>

  <!-- PROCESS -->
  <div class="section">
    <h2>Made from scratch</h2>
    <div class="images">
      <img src="cookies-process1.jpg">
      <img src="cookies-process2.jpg">
    </div>
  </div>

</body>
</html>
